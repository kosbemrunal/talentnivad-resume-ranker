<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Multiple Resumes - TalentNivad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .navbar-nav .nav-link {
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .navbar-nav .nav-link:hover {
            color: #667eea !important;
        }
        .form-section {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #667eea;
            background-color: #f8f9fa;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.png') }}" height="50"class="me-2">
TalentNivad
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/compare">
                            <i class="fas fa-upload me-1"></i>Compare Resumes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/candidates">
                            <i class="fas fa-users me-1"></i>Candidates
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="form-section">
                    <h2 class="text-center mb-4">
                        <i class="fas fa-balance-scale text-primary me-2"></i>
                        Compare Multiple Resumes
                    </h2>
                    <p class="text-center text-muted mb-4">
                        Upload multiple resumes and compare them against a job description to find the best match
                    </p>

                    <form action="/compare" method="POST" enctype="multipart/form-data">
                        <!-- Job Title -->
                        <div class="mb-3">
                            <label for="job_title" class="form-label">
                                <i class="fas fa-briefcase me-2"></i>Job Title
                            </label>
                            <input type="text" class="form-control" id="job_title" name="job_title" 
                                   placeholder="e.g. Software Developer, Data Analyst, Marketing Manager" required>
                        </div>

                        <!-- Job Description -->
                        <div class="mb-3">
                            <label for="job_desc" class="form-label">
                                <i class="fas fa-file-alt me-2"></i>Full Job Description
                            </label>
                            <textarea class="form-control" id="job_desc" name="job_desc" rows="6" 
                                      placeholder="Paste the complete job description here. Include responsibilities, requirements, and qualifications..." required></textarea>
                        </div>

                        <!-- Required Skills -->
                        <div class="mb-3">
                            <label for="skills" class="form-label">
                                <i class="fas fa-tools me-2"></i>Required Skills (comma-separated)
                            </label>
                            <input type="text" class="form-control" id="skills" name="skills" 
                                   placeholder="e.g. Python, SQL, Machine Learning, Communication, Leadership" required>
                        </div>

                        <!-- Education -->
                        <div class="mb-3">
                            <label for="education" class="form-label">
                                <i class="fas fa-graduation-cap me-2"></i>Education Requirements
                            </label>
                            <input type="text" class="form-control" id="education" name="education" 
                                   placeholder="e.g. Bachelor's in Computer Science, Master's preferred" required>
                        </div>

                        <!-- Experience -->
                        <div class="mb-3">
                            <label for="experience" class="form-label">
                                <i class="fas fa-clock me-2"></i>Experience Required
                            </label>
                            <input type="text" class="form-control" id="experience" name="experience" 
                                   placeholder="e.g. 2-3 years, Entry level, Senior level" required>
                        </div>

                        <!-- Resume Uploads -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-upload me-2"></i>Upload Resumes (PDF, DOC, or DOCX)
                            </label>
                            <div class="upload-area">
                                <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                                <h5>Drag & Drop Files Here</h5>
                                <p class="text-muted">or click to browse</p>
                                <input type="file" class="form-control" id="resumes" name="resumes" 
                                       accept=".pdf,.doc,.docx" multiple required>
                                <small class="text-muted">You can select multiple files. Supported formats: PDF, DOC, DOCX</small>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary submit-btn">
                                <i class="fas fa-rocket me-2"></i>Analyze & Rank Resumes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
