<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TalentNivad</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height:100vh;
}

.navbar-brand{
font-weight:bold;
font-size:1.4rem;
background: rgba(0,0,0,0.8) !important;
backdrop-filter: blur(10px);
}

.card-custom{
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
background: rgba(255,255,255,0.95);
backdrop-filter: blur(8px);
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/">
<img src="{{ url_for('static', filename='logo.png') }}" height="50"class="me-2">
TalentNivad
</a>

<div>

{% if current_user.is_authenticated %}

<a href="/" class="btn btn-outline-light me-2">Home</a>

<a href="/compare" class="btn btn-outline-light me-2">Compare</a>

<a href="/candidates" class="btn btn-outline-light me-2">Candidates</a>

<a href="/logout" class="btn btn-danger">Logout</a>

{% else %}

<a href="/login" class="btn btn-outline-light me-2">Login</a>

<a href="/register" class="btn btn-success">Register</a>

{% endif %}

</div>

</div>

</nav>

<div class="container mt-5">

{% block content %}

{% endblock %}

</div>

</body>
</html>
